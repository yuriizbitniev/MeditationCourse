<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rusov Academy</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f8f9fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #333;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 40px 20px;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            margin: 0 20px;
        }
        h1 {
            font-size: 2.5rem;
            margin-top: 0;
            margin-bottom: 10px;
            font-weight: 600;
            color: #2c3e50;
        }
        h2 {
            font-size: 1.25rem;
            font-weight: 400;
            color: #7f8c8d;
            margin-bottom: 20px;
        }
        p {
            font-size: 1rem;
            line-height: 1.6;
            color: #555;
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Rusov Academy</h1>
        <h2>Сайт находится в стадии разработки</h2>
        <p>Благодарим за терпение.</p>
    </div>
</body>
</html>
